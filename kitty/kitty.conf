# kitty.conf — Pure Dark Minimal
# ~/.config/kitty/kitty.conf


# ─── FONTS ────────────────────────────────────────────────────────────────────
# BEGIN_KITTY_FONTS
font_family      family="Hack Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 14.0
disable_ligatures never
adjust_line_height 1


# ─── COLORS ───────────────────────────────────────────────────────────────────
foreground #FFFFFF
background #000000

selection_background #333333
selection_foreground #FFFFFF

url_color #AAAAAA
url_style curly

# ANSI 16 — pure neutral, no colour bleeding
# color0  #000000
# color8  #555555

# color1  #CC4444
# color9  #FF5555

# color2  #44AA44
# color10 #55FF55

# color3  #AAAA44
# color11 #FFFF55

# color4  #4444CC
# color12 #5555FF

# color5  #AA44AA
# color13 #FF55FF

# color6  #44AAAA
# color14 #55FFFF

# color7  #AAAAAA
# color15 #FFFFFF


# ─── CURSOR ───────────────────────────────────────────────────────────────────
cursor                #FFFFFF
cursor_text_color     #000000
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0


# ─── TRANSPARENCY ─────────────────────────────────────────────────────────────
# background_opacity 0.82
background_opacity 0.82
dynamic_background_opacity yes
# dim_opacity 0.70


# ─── WINDOW ───────────────────────────────────────────────────────────────────
# hide_window_decorations yes
window_padding_width 12
remember_window_size yes

active_border_color   #444444
inactive_border_color #222222


# ─── TAB BAR ──────────────────────────────────────────────────────────────────
tab_bar_style hidden


# ─── SCROLLBACK ───────────────────────────────────────────────────────────────
scrollback_lines 10000
wheel_scroll_multiplier 5.0


# ─── PERFORMANCE ──────────────────────────────────────────────────────────────
repaint_delay 8
input_delay 2
sync_to_monitor yes


# ─── BELL ─────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0


# ─── MOUSE ────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
focus_follows_mouse no


# ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
kitty_mod ctrl+shift

map kitty_mod+t     new_tab_with_cwd
map kitty_mod+w     close_tab
map kitty_mod+right next_tab
map kitty_mod+left  previous_tab

map kitty_mod+enter new_window_with_cwd
map kitty_mod+]     next_window
map kitty_mod+[     previous_window

map kitty_mod+equal     change_font_size all +1.0
map kitty_mod+minus     change_font_size all -1.0
map kitty_mod+backspace change_font_size all 0

map kitty_mod+a>m set_background_opacity +0.05
map kitty_mod+a>l set_background_opacity -0.05
map kitty_mod+a>d set_background_opacity default

map kitty_mod+f5 load_config_file


# ─── SHELL INTEGRATION ────────────────────────────────────────────────────────
shell_integration enabled
allow_remote_control yes


# ─── MISC ─────────────────────────────────────────────────────────────────────
confirm_os_window_close 0
term xterm-256color
